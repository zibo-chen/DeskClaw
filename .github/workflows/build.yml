name: Build Desktop Apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.35.7"
  RUST_VERSION: "1.92.0"
  ZEROCLAW_REPO: "zibo-chen/zeroclaw"
  ZEROCLAW_REF: "main-deskclaw"
  # Bundled runtime versions
  PYTHON_BUILD_TAG: "20260303"
  PYTHON_VERSION: "3.12.13"

jobs:
  # ---------------------------------------------------------------------------
  # macOS (universal: x86_64 + arm64)
  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone zeroclaw dependency
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ZEROCLAW_REPO }}
          ref: ${{ env.ZEROCLAW_REF }}
          path: zeroclaw

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: macos-cargo-${{ hashFiles('rust/Cargo.lock', 'zeroclaw/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Bundle runtimes (Python + Bun)
        env:
          PYTHON_BUILD_TAG: ${{ env.PYTHON_BUILD_TAG }}
          PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
        run: |
          chmod +x installers/download_runtimes.sh
          bash installers/download_runtimes.sh \
            "build/macos/Build/Products/Release/coraldesk.app/Contents/Resources/runtimes" \
            macos aarch64

      - name: Package macOS app
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent coraldesk.app coraldesk-macos.zip

      - name: Create DMG installer
        run: |
          # Install create-dmg
          brew install create-dmg
          # Create DMG
          create-dmg \
            --volname "CoralDesk" \
            --volicon "assets/icons/app_icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "coraldesk.app" 150 185 \
            --hide-extension "coraldesk.app" \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "build/CoralDesk-macos.dmg" \
            "build/macos/Build/Products/Release/coraldesk.app" \
          || true
          # create-dmg returns non-zero if icon positioning fails, but DMG is still valid
          test -f "build/CoralDesk-macos.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: coraldesk-macos
          path: |
            build/macos/Build/Products/Release/coraldesk-macos.zip
            build/CoralDesk-macos.dmg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux (x86_64)
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone zeroclaw dependency
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ZEROCLAW_REPO }}
          ref: ${{ env.ZEROCLAW_REF }}
          path: zeroclaw

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libayatana-appindicator3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: linux-cargo-${{ hashFiles('rust/Cargo.lock', 'zeroclaw/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Linux app
        run: flutter build linux --release

      - name: Bundle runtimes (Python + Bun)
        env:
          PYTHON_BUILD_TAG: ${{ env.PYTHON_BUILD_TAG }}
          PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
        run: |
          chmod +x installers/download_runtimes.sh
          bash installers/download_runtimes.sh \
            "build/linux/x64/release/bundle/runtimes" \
            linux x86_64

      - name: Package Linux app
        run: |
          cd build/linux/x64/release
          tar -czf coraldesk-linux-x64.tar.gz bundle

      - name: Build AppImage
        run: |
          sudo apt-get install -y libfuse2
          chmod +x installers/linux/build_appimage.sh
          bash installers/linux/build_appimage.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: coraldesk-linux-x64
          path: |
            build/linux/x64/release/coraldesk-linux-x64.tar.gz
            build/CoralDesk-x86_64.AppImage
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows (x64)
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone zeroclaw dependency
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ZEROCLAW_REPO }}
          ref: ${{ env.ZEROCLAW_REF }}
          path: zeroclaw

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Rust native build dependencies (Windows)
        run: |
          choco install nasm strawberryperl -y

      - name: Add Windows Rust target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            rust\target
          key: windows-cargo-${{ hashFiles('rust/Cargo.lock', 'zeroclaw/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows app
        env:
          CARGOKIT_VERBOSE: "1"
          RUST_BACKTRACE: full
          CC: cl
          CXX: cl
          CC_x86_64_pc_windows_msvc: cl
          CXX_x86_64_pc_windows_msvc: cl
        run: flutter build windows --release

      - name: Bundle runtimes (Python + Bun)
        run: |
          powershell -ExecutionPolicy Bypass -File installers\download_runtimes.ps1 `
            -TargetDir "build\windows\x64\runner\Release\runtimes" `
            -PythonBuildTag "${{ env.PYTHON_BUILD_TAG }}" `
            -PythonVersion "${{ env.PYTHON_VERSION }}"

      - name: Package Windows app
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\coraldesk-windows-x64.zip

      - name: Build Windows installer (Inno Setup)
        run: |
          # Inno Setup is pre-installed on windows-latest
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="${{ github.ref_name }}" installers\windows\setup.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: coraldesk-windows-x64
          path: |
            build/coraldesk-windows-x64.zip
            build/installer/coraldesk-windows-x64-setup.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create GitHub Release (only on tags)
  # ---------------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/coraldesk-macos/coraldesk-macos.zip
            artifacts/coraldesk-macos/CoralDesk-macos.dmg
            artifacts/coraldesk-linux-x64/coraldesk-linux-x64.tar.gz
            artifacts/coraldesk-linux-x64/CoralDesk-x86_64.AppImage
            artifacts/coraldesk-windows-x64/coraldesk-windows-x64.zip
            artifacts/coraldesk-windows-x64/coraldesk-windows-x64-setup.exe

  # ---------------------------------------------------------------------------
  # Create unstable pre-release (on main branch pushes)
  # ---------------------------------------------------------------------------
  prerelease-main:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create unstable GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: unstable-${{ github.run_number }}-${{ github.sha }}
          name: Unstable main #${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          draft: false
          make_latest: false
          generate_release_notes: true
          files: |
            artifacts/coraldesk-macos/coraldesk-macos.zip
            artifacts/coraldesk-macos/CoralDesk-macos.dmg
            artifacts/coraldesk-linux-x64/coraldesk-linux-x64.tar.gz
            artifacts/coraldesk-linux-x64/CoralDesk-x86_64.AppImage
            artifacts/coraldesk-windows-x64/coraldesk-windows-x64.zip
            artifacts/coraldesk-windows-x64/coraldesk-windows-x64-setup.exe
